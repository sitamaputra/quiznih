[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
script   = "script"
test     = "test"
optimizer        = true
optimizer_runs   = 200
fuzz.runs        = 256

[rpc_endpoints]
celo-sepolia = "https://celo-sepolia.drpc.org"
alfajores    = "https://alfajores-forno.celo-testnet.org"
celo         = "https://forno.celo.org"

[etherscan]
celo-sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://api-sepolia.celoscan.io/api" }
alfajores    = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }
celo         = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
